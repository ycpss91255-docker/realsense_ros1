# UNVERIFIED USB2 profile: color 640x480@15, aligned depth 1280x720@15. IR and
# IMU off. The USB2 whitelist was not enumerated (camera was on a USB3 link); 720p
# depth may exceed USB2 bandwidth or not be offered -- verify on a real USB2 link.
color_width: 640
color_height: 480
color_fps: 15
depth_width: 1280
depth_height: 720
depth_fps: 15
align_depth: true
enable_infra1: false
enable_infra2: false
enable_gyro: false
enable_accel: false
