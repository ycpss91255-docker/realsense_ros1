# USB 2.x fallback profile. Rationale in ../README.md.
color_width: 640       # 640x480 color fits a USB 2 link
color_height: 480
color_fps: 15          # 30 fps delivers 0 frames on USB 2; 15 streams
depth_width: 480       # depth dropped to 480x270 to fit USB 2 beside color
depth_height: 270
depth_fps: 15
align_depth: true
enable_infra1: false   # IR off to stay within USB 2 bandwidth
enable_infra2: false
enable_gyro: false     # IMU off to stay within USB 2 bandwidth
enable_accel: false
